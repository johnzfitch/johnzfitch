name: readme-dashboard

on:
  schedule:
    # Daily refresh. Keeps the dashboard "live" without tracking users.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      update_descriptions:
        description: 'Regenerate descriptions via LLM'
        type: boolean
        default: false
      rotate_recent:
        description: 'Rotate Recent Work to most recently pushed repos'
        type: boolean
        default: false
  push:
    paths:
      - "data/projects.toml"
      - "scripts/gen_readme_assets.py"
      - ".github/workflows/readme-dashboard.yml"

permissions:
  contents: write
  models: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate SVG assets and update README
        run: |
          FLAGS=""
          # Scheduled runs always rotate Recent Work
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="--rotate-recent"
          fi
          # Manual trigger options
          if [ "${{ github.event.inputs.update_descriptions }}" = "true" ]; then
            FLAGS="$FLAGS --update-descriptions"
          fi
          if [ "${{ github.event.inputs.rotate_recent }}" = "true" ]; then
            FLAGS="$FLAGS --rotate-recent"
          fi
          python3 scripts/gen_readme_assets.py $FLAGS
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit changes (if any)
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/assets/cards/*.svg
          git add README.md
          git add .github/cache/*.json 2>/dev/null || true

          git diff --cached --quiet && { echo "No staged changes."; exit 0; }

          git commit -m "chore: refresh readme dashboard [skip ci]"
          git push
